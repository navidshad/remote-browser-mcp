<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#101a2d"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1280" height="560" fill="url(#bg)"/>

  <!-- Title -->
  <text x="640" y="72" text-anchor="middle" fill="#f8fafc" font-size="40" font-weight="700">Remote Browser MCP</text>
  <text x="640" y="108" text-anchor="middle" fill="#8fa3bd" font-size="19">A cloud AI agent browses with <tspan fill="#e2e8f0" font-weight="600">your real Chrome</tspan> — logins, cookies &amp; home IP included</text>

  <!-- ── LEFT: Cloud VM ── -->
  <g filter="url(#soft)">
    <rect x="120" y="180" width="340" height="220" rx="22" fill="#16233a" stroke="#2e415e" stroke-width="1.5"/>
  </g>
  <!-- cloud icon -->
  <g transform="translate(255,225)">
    <path d="M25 32 a20 20 0 0 1 1 -40 a26 26 0 0 1 50 -6 a18 18 0 0 1 4 46 z" fill="#1f2f47" stroke="#60a5fa" stroke-width="2.5" transform="translate(-13,8)"/>
  </g>
  <text x="290" y="270" text-anchor="middle" font-size="34">🤖</text>
  <text x="290" y="330" text-anchor="middle" fill="#f1f5f9" font-size="24" font-weight="700">AI Agent</text>
  <text x="290" y="360" text-anchor="middle" fill="#8fa3bd" font-size="16">on a cloud VM</text>

  <!-- ── MIDDLE: connection ── -->
  <line x1="475" y1="290" x2="795" y2="290" stroke="#38bdf8" stroke-width="4" stroke-dasharray="12 9" stroke-linecap="round" marker-end="url(#arrowG)"/>
  <!-- lock chip -->
  <rect x="560" y="240" width="160" height="36" rx="18" fill="#0e2233" stroke="#2f6d5b" stroke-width="1.5"/>
  <text x="640" y="264" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="700">🔒 secure link</text>
  <text x="640" y="330" text-anchor="middle" fill="#7c8aa0" font-size="15" font-weight="600">your browser dials out</text>
  <text x="640" y="352" text-anchor="middle" fill="#596b84" font-size="14">nothing to open or expose at home</text>

  <!-- ── RIGHT: Your Chrome ── -->
  <g filter="url(#soft)">
    <rect x="820" y="180" width="340" height="220" rx="22" fill="#16233a" stroke="#2e415e" stroke-width="1.5"/>
  </g>
  <!-- browser window -->
  <rect x="850" y="208" width="280" height="130" rx="12" fill="#0e1a2b" stroke="#31445f" stroke-width="1.5"/>
  <rect x="850" y="208" width="280" height="30" rx="12" fill="#1b2a42"/>
  <rect x="850" y="223" width="280" height="15" fill="#1b2a42"/>
  <circle cx="868" cy="223" r="5" fill="#ef4444"/>
  <circle cx="885" cy="223" r="5" fill="#f59e0b"/>
  <circle cx="902" cy="223" r="5" fill="#22c55e"/>
  <!-- page lines -->
  <rect x="868" y="254" width="120" height="10" rx="5" fill="#33465f"/>
  <rect x="868" y="274" width="200" height="8" rx="4" fill="#273a53"/>
  <rect x="868" y="290" width="170" height="8" rx="4" fill="#273a53"/>
  <!-- agent active badge -->
  <rect x="965" y="305" width="150" height="26" rx="13" fill="#0e2a22" stroke="#34d399" stroke-width="1.5"/>
  <text x="1040" y="323" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="600">⚡ agent active</text>
  <text x="990" y="367" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700">Your real Chrome</text>
  <text x="990" y="390" text-anchor="middle" fill="#8fa3bd" font-size="14">logged in · watch live · take over anytime</text>

  <!-- footer strip -->
  <g font-size="16" fill="#94a3b8" text-anchor="middle" font-weight="600">
    <text x="285" y="480">🔐 Your logins &amp; identity</text>
    <text x="640" y="480">📡 No open ports at home</text>
    <text x="995" y="480">👀 Watch &amp; take over</text>
  </g>
  <line x1="120" y1="510" x2="1160" y2="510" stroke="#1e293b" stroke-width="1"/>
  <text x="640" y="537" text-anchor="middle" fill="#48566b" font-size="14">One Chrome extension locally · standard MCP browser tools for the agent</text>
</svg>
