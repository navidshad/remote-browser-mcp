<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font: 13px/1.45 -apple-system, system-ui, sans-serif;
        width: 320px;
        margin: 0;
        padding: 14px 16px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      label {
        display: block;
        font-weight: 600;
        margin: 10px 0 3px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font: inherit;
        border: 1px solid #8884;
        border-radius: 6px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }
      button {
        flex: 1;
        padding: 7px 10px;
        font: inherit;
        font-weight: 600;
        border: 0;
        border-radius: 6px;
        cursor: pointer;
        background: #2563eb;
        color: #fff;
      }
      button.secondary {
        background: #8883;
        color: inherit;
      }
      #status {
        margin-top: 14px;
        padding: 8px 10px;
        border-radius: 6px;
        background: #8881;
        font-weight: 600;
      }
      .dot {
        display: inline-block;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        margin-right: 7px;
        vertical-align: -1px;
        background: #999;
      }
      .ok {
        background: #16a34a;
      }
      .warn {
        background: #d97706;
      }
      .err {
        background: #dc2626;
      }
      .hint {
        color: #8889;
        font-size: 11px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Remote Browser Agent</h1>

    <label for="url">Agent URL</label>
    <input id="url" type="text" placeholder="wss://browser-ws.subturtle.app" spellcheck="false" />
    <div class="hint">The VM bridge WebSocket endpoint (wss://).</div>

    <label for="token">Access Token</label>
    <input id="token" type="password" placeholder="paste the shared token" spellcheck="false" />

    <div class="row">
      <button id="save">Save &amp; Connect</button>
      <button id="reconnect" class="secondary">Reconnect</button>
    </div>

    <div id="status"><span class="dot"></span><span id="statusText">…</span></div>

    <script src="popup.js"></script>
  </body>
</html>
